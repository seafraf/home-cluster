name: Generate Kubernetes manifests

on:
  push:
    branches:
      - main
    paths-ignore:
      - manifests/**

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          extra-experimental-features = nix-command flakes

    - uses: arnarg/nixidy/actions/build@main
      id: build
      with:
        environment: .#home

    - shell: bash
      run: |
        rm -rf manifests
        mkdir -p manifests
        rsync -avL --delete "${{ steps.build.outputs.out-path }}/" manifests/

    - uses: EndBug/add-and-commit@v9
      id: commit
      with:
        default_author: github_actions
        message: "chore: promote to home ${{github.sha}}"
        fetch: false
        new_branch: promote/env/home
        push: --set-upstream origin promote/env/home --force

    - uses: thomaseizinger/create-pull-request@1.4.0
      if: ${{ steps.commit.outputs.pushed == 'true' }}
      with:
        github_token: ${{github.token}}
        head: promote/env/dev
        base: main
        title: "chore: promote to dev ${{github.sha}}"