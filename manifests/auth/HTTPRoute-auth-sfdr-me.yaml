apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-sfdr-me
  namespace: network
spec:
  hostnames:
    - auth.sfdr.me
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: sfdr-me
      namespace: network
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: authelia
          namespace: auth-system
          port: 9091
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
