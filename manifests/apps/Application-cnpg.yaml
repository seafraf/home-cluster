apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg
  namespace: argocd
spec:
  destination:
    namespace: database
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/cnpg
    repoURL: git@github.com:seafraf/home-cluster.git
    targetRevision: manifests/home
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
