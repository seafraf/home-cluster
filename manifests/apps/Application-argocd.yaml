apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/argocd
    repoURL: git@github.com:seafraf/home-cluster.git
    targetRevision: manifests/home
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
