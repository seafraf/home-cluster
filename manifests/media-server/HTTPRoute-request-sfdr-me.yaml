apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: request-sfdr-me
  namespace: network
spec:
  hostnames:
    - request.sfdr.me
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: sfdr-me
      namespace: network
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: seerr
          namespace: media-server
          port: 5055
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
