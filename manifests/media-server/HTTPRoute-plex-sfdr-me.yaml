apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex-sfdr-me
  namespace: network
spec:
  hostnames:
    - plex.sfdr.me
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: sfdr-me
      namespace: network
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: plex
          namespace: media-server
          port: 32400
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
