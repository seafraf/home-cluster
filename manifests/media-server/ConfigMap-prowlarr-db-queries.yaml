data:
  query0: "BEGIN; \nTRUNCATE TABLE \"Applications\";\nINSERT INTO \"Applications\"\n  (\"Name\", \"Implementation\", \"Settings\", \"ConfigContract\", \"SyncLevel\", \"Tags\")\n  VALUES\n  ('Sonarr', 'Sonarr', json_build_object(\n    'prowlarrUrl', 'http://prowlarr.media-server.svc.cluster.local:9696',\n    'baseUrl', 'http://sonarr.media-server.svc.cluster.local:8989',\n    'apiKey', :'SONARR_API_KEY',\n    'syncCategories', json_build_array(5000, 5010, 5020, 5030, 5040, 5045, 5050, 5090),\n    'animeSyncCategories', json_build_array(5000),\n    'syncAnimeStandardFormatSearch', true,\n    'syncRejectBlocklistedTorrentHashesWhileGrabbing', false\n  )::text, 'SonarrSettings', 2, '[]');\n\nINSERT INTO \"Applications\"\n  (\"Name\", \"Implementation\", \"Settings\", \"ConfigContract\", \"SyncLevel\", \"Tags\")\n  VALUES\n  ('Radarr', 'Radarr', json_build_object(\n    'prowlarrUrl', 'http://prowlarr.media-server.svc.cluster.local:9696',\n    'baseUrl', 'http://radarr.media-server.svc.cluster.local:7878',\n    'apiKey', :'RADARR_API_KEY',\n    'syncCategories', json_build_array(2000, 2010, 2020, 2030, 2040, 2045, 2050, 2060, 2070, 2080, 2090),\n    'syncRejectBlocklistedTorrentHashesWhileGrabbing', false\n  )::text, 'RadarrSettings', 2, '[]');\nCOMMIT;\n"
  query1: "BEGIN; \nTRUNCATE TABLE \"DownloadClients\" RESTART IDENTITY;\nINSERT INTO \"DownloadClients\"\n  (\"Enable\", \"Name\", \"Implementation\", \"Settings\", \"ConfigContract\")\n  VALUES\n  (TRUE, 'Sabnzbd', 'SABnzbd', json_build_object(\n    'host', 'sabnzbd.media-server.svc.cluster.local',\n    'port', 8080,\n    'useSsl', false,\n    'apiKey', :'SABNZDB_API_KEY'\n    ,\n'category', 'prowlarr',\n'priority', 0\n\n  )::text, 'SabnzbdSettings');\n\nINSERT INTO \"DownloadClients\"\n  (\"Enable\", \"Name\", \"Implementation\", \"Settings\", \"ConfigContract\")\n  VALUES\n  (TRUE, 'Transmission', 'Transmission', json_build_object(\n    'host', 'transmission.media-server.svc.cluster.local',\n    'port', 9091,\n    'useSsl', false,\n    'urlBase', '/transmission/',\n    'username', '',\n    'password', '',\n    'addPaused', false\n    ,\n'category', 'prowlarr',\n'priority', 0\n\n  )::text, 'TransmissionSettings');\nCOMMIT;\n"
