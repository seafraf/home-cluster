apiVersion: v1
data:
  query0: |
    BEGIN;
    TRUNCATE TABLE "RootFolders";
    INSERT INTO "RootFolders" ("Path") VALUES ('/media/movies');
    COMMIT;
  query1: "BEGIN; \nTRUNCATE TABLE \"DownloadClients\" RESTART IDENTITY;\nINSERT INTO \"DownloadClients\"\n  (\"Enable\", \"Name\", \"Implementation\", \"Settings\", \"ConfigContract\",\"Tags\")\n  VALUES\n  (TRUE, 'Sabnzbd', 'SABnzbd', json_build_object(\n    'host', 'sabnzbd.media-server.svc.cluster.local',\n    'port', 8080,\n    'useSsl', false,\n    'apiKey', :'SABNZDB_API_KEY'\n    ,\n'movieCategory', 'radarr',\n'recentMoviePriority', -100,\n'olderMoviePriority', -100\n,'movieDirectory', '/media/download'\n\n  )::text, 'SabnzbdSettings','[]');\n\nINSERT INTO \"DownloadClients\"\n  (\"Enable\", \"Name\", \"Implementation\", \"Settings\", \"ConfigContract\",\"Tags\")\n  VALUES\n  (TRUE, 'Transmission', 'Transmission', json_build_object(\n    'host', 'transmission.media-server.svc.cluster.local',\n    'port', 9091,\n    'useSsl', false,\n    'urlBase', '/transmission/',\n    'username', '',\n    'password', '',\n    'addPaused', false\n    ,\n'movieCategory', 'radarr',\n'recentMoviePriority', -100,\n'olderMoviePriority', -100\n\n  )::text, 'TransmissionSettings','[]');\nCOMMIT;\n"
  query2: "TRUNCATE TABLE \"Notifications\" RESTART IDENTITY;\n\nINSERT INTO \"Notifications\" (\"Name\",\"OnGrab\",\"OnDownload\",\"Settings\",\"Implementation\",\"ConfigContract\",\"OnUpgrade\",\"Tags\",\"OnRename\",\"OnHealthIssue\",\"IncludeHealthWarnings\",\"OnMovieDelete\",\"OnMovieFileDelete\",\"OnMovieFileDeleteForUpgrade\",\"OnApplicationUpdate\",\"OnMovieAdded\",\"OnHealthRestored\",\"OnManualInteractionRequired\")\nVALUES ('Plex Media Server',false,true,json_build_object(\n        'server', 'https://plex.sfdr.me',\n        'host', 'plex.media-server.svc.cluster.local',\n        'useSsl', false, \n        'authToken', :'PLEX_TOKEN',\n        'signIn', 'startOAuth',\n        'updateLibrary', true,\n        'isValid', true\n      )::text,'PlexServer','PlexServerSettings',true,'[]',true,false,false,true,true,true,false,false,false,false), ('Jellyfin',true,true,json_build_object(\n        'server', 'https://plex.sfdr.me',\n        'host', 'plex.media-server.svc.cluster.local',\n        'useSsl', false, \n        'authToken', :'PLEX_TOKEN',\n        'signIn', 'startOAuth',\n        'updateLibrary', true,\n        'isValid', true\n      )::text,'MediaBrowser','MediaBrowserSettings',true,'[]',true,false,false,true,true,true,true,false,false,false);\n"
kind: ConfigMap
metadata:
  name: radarr-db-queries
  namespace: media-server
